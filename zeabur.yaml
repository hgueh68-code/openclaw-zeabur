# Zeabur Deployment Configuration for OpenClaw
apiVersion: zeabur.com/v1
kind: Service
metadata:
  name: openclaw
spec:
  source:
    image: ghcr.io/openclaw/openclaw:latest
  ports:
    - port: 18789
      type: HTTP
  env:
    - name: TELEGRAM_BOT_TOKEN
      value: "8308947788:AAEj-45c302No_E7SYKML2tOahrf_mCt1S8"
    - name: OPENAI_API_KEY
      value: "0107268b-f8e5-467c-a768-a8d76b0c1ca2"
    - name: OPENAI_BASE_URL
      value: "https://api.sambanova.ai/v1"
    - name: OPENCLAW_GATEWAY_BIND
      value: "lan"
  volumes:
    - name: openclaw-data
      path: /home/node/.openclaw
